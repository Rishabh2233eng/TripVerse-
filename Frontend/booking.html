<!DOCTYPE html>
<html>
<head>
    <title>Booking - TripVerse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h1 class="logo">TripVerse</h1>
    <ul class="nav-links">
        <li><a href="Index.html">Home</a></li>
        <li><a href="service.html">Services</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- BOOKING SECTION -->
<section class="booking-section" id="booking">

    <div class="booking-container">
        <div class="section-tabs">
            <button class="tab-btn active" onclick="showSection('booking')">Book Ticket</button>
            <button class="tab-btn" onclick="showSection('tickets')">My Tickets</button>
        </div>

        <h2>Book Your Journey</h2>
        <p class="booking-subtitle">Find the best travel options across India</p>

        <form class="booking-form">

    <div class="input-group">
        <label>From</label>
        <input type="text" id="from" placeholder="Enter departure city" required>
    </div>

    <div class="input-group">
        <label>To</label>
        <input type="text" id="to" placeholder="Enter destination city" required>
    </div>

    <div class="input-group">
        <label>Date</label>
        <input type="date" id="date" required>
    </div>

    <div class="input-group">
        <label>Transport</label>
        <select id="transport">
            <option>Flight</option>
            <option>Train</option>
            <option>Bus</option>
            <option>Cab</option>
        </select>
    </div>

    <button type="submit" class="search-btn">Search Now</button>

</form>
    </div>

</section>

<!-- MY TICKETS SECTION -->
<section class="tickets-section" id="tickets">
    <div class="tickets-container">
        <h2>My Booked Tickets</h2>
        <p class="tickets-subtitle">View all your travel bookings</p>

        <div id="tickets-list" class="tickets-list">
            <!-- Tickets will be displayed here -->
        </div>

        <div id="no-tickets" class="no-tickets" style="display: none;">
            <p>You haven't booked any tickets yet.</p>
            <p>Book your first journey above!</p>
        </div>
    </div>
</section>
<script src="javascript/script.js"></script>
</body>
</html>

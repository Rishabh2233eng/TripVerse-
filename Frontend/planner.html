<!DOCTYPE html>
<html>
<head>
    <title>Trip Planner - TripVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h1 class="logo">TripVerse</h1>
    <ul class="nav-links">
        <li><a href="INDEX.html">Home</a></li>
        <li><a href="service.html">Services</a></li>
        <li><a href="planner.html">Planner</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<section class="page-header">
    <h2>Plan Your Journey</h2>
</section>

<section class="planner-section">

    <form class="planner-form">

        <div class="form-group">
            <label>Starting Location</label>
            <input type="text" id="start-location" placeholder="Enter starting city" required>
        </div>

        <div class="form-group">
            <label>Destination</label>
            <input type="text" id="destination" placeholder="Enter destination city" required>
        </div>

        <div class="form-group">
            <label>Travel Date</label>
            <input type="date" id="travel-date" required>
        </div>

        <div class="form-group">
            <label>Return Date (Optional)</label>
            <input type="date" id="return-date">
        </div>

        <div class="form-group">
            <label>Number of Travelers</label>
            <input type="number" id="travelers" min="1" max="10" value="1" required>
        </div>

        <div class="form-group">
            <label>Preferred Transport</label>
            <select id="transport" required>
                <option value="Flight">Flight</option>
                <option value="Train">Train</option>
                <option value="Bus">Bus</option>
                <option value="Cab">Cab</option>
            </select>
        </div>

        <button type="submit" class="planner-btn">Generate Plan</button>

    </form>

</section>

<section class="saved-plans-section">
    <h3>Your Saved Trip Plans</h3>
    <div id="saved-plans-container" class="saved-plans-container">
        <!-- Saved plans will be displayed here -->
    </div>
</section>

</body>
</html>
